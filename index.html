<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 할인 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0f;
  --surface: #12141a;
  --surface2: #1a1d26;
  --border: #252836;
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --muted: #64748b;
  --sans: 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
header { padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
.logo-box { width: 34px; height: 34px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; }
header h1 { font-size: 15px; font-weight: 500; }
.header-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
.layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }
.left { width: 300px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.panel-title { padding: 14px 16px 8px; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.06em; }
.search-wrap { padding: 0 12px 8px; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: var(--sans); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { outline: none; border-color: var(--accent); }
.brand-list { padding: 0 12px; display: flex; flex-direction: column; gap: 6px; padding-bottom: 12px; }
.brand-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
.brand-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.06); }
.brand-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.brand-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
.tag-ok { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-no { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-cond { background: rgba(245,158,11,0.15); color: var(--amber); }
.result-panel { margin: 0 12px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: none; }
.result-panel.show { display: block; }
.result-title { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
.result-row { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.result-row:last-child { border-bottom: none; }
.result-label { color: var(--muted); min-width: 80px; flex-shrink: 0; }
.ok { color: var(--green); } .no { color: var(--red); } .cond { color: var(--amber); }
.quick-section { padding: 0 12px 12px; }
.qbtn { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--muted); cursor: pointer; text-align: left; font-family: var(--sans); margin-bottom: 5px; transition: all 0.15s; }
.qbtn:hover { border-color: var(--accent); color: var(--text); }
.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 8px; }
.ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.chat-title { font-size: 14px; font-weight: 500; }
.chat-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg-wrap { display: flex; gap: 10px; align-items: flex-start; }
.msg-wrap.user { flex-direction: row-reverse; }
.avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.avatar.ai { background: var(--accent); } .avatar.user { background: var(--surface2); border: 1px solid var(--border); }
.msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
.msg-bubble.ai { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 3px; color: var(--text); }
.msg-bubble.user { background: var(--accent); color: #fff; border-top-right-radius: 3px; }
.typing { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }
.chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); }
.suggested { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.suggest-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
.suggest-btn:hover { border-color: var(--accent); color: var(--text); }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); font-size: 13px; font-family: var(--sans); }
.input-row input::placeholder { color: var(--muted); }
.input-row input:focus { outline: none; border-color: var(--accent); }
.send-btn { background: var(--accent); border: none; border-radius: 10px; width: 42px; height: 42px; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; flex-shrink: 0; }
.send-btn:hover { opacity: 0.85; } .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 640px) { .left { display: none; } .right { width: 100%; } }
</style>
</head>
<body>
<header>
  <div class="logo-box">🏷️</div>
  <h1>행사 할인 안내</h1>
  <span class="header-sub">— 환율보상 3% 쿠폰 적용 가이드</span>
</header>
<div class="layout">
  <div class="left">
    <div class="panel-title">브랜드 / 상품 조회</div>
    <div class="search-wrap">
      <input type="text" id="brandSearch" placeholder="브랜드명 검색..." oninput="filterBrands()">
    </div>
    <div class="result-panel" id="resultPanel">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultRows"></div>
    </div>
    <div class="brand-list" id="brandList"></div>
    <div class="panel-title" style="margin-top:4px;">빠른 질문</div>
    <div class="quick-section">
      <button class="qbtn" onclick="askQuick('환율보상 3% 기본 적용 조건 알려줘')">📋 기본 적용 조건</button>
      <button class="qbtn" onclick="askQuick('주류랑 담배 같이 사면 최대 얼마까지 할인돼?')">🍾 주류+담배 최대 할인</button>
      <button class="qbtn" onclick="askQuick('환율보상 3% 절대 안되는 상품 전부 알려줘')">❌ 적용 불가 전체 목록</button>
      <button class="qbtn" onclick="askQuick('카카오웰컴 5%랑 환율보상 3% 같이 쓸 수 있어?')">💛 카카오웰컴 중복 여부</button>
      <button class="qbtn" onclick="askQuick('닷사이 살 때 최대 할인 얼마야?')">🍶 닷사이 최대 할인</button>
      <button class="qbtn" onclick="askQuick('유통기한 임박 할인 상품에 환율보상 되나요?')">⚠️ 유통기한 임박 상품</button>
    </div>
  </div>
  <div class="right">
    <div class="chat-header">
      <div class="ai-dot"></div>
      <span class="chat-title">할인 AI</span>
      <span class="chat-sub">— 상품명이나 상황을 말씀하시면 바로 안내해 드려요</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg-wrap">
        <div class="avatar ai">🤖</div>
        <div class="msg-bubble ai">
          안녕하세요! 환율보상 3% 쿠폰 적용 여부를 바로 확인해 드려요.<br><br>
          예시로 이렇게 물어보세요:<br>
          • "닷사이 사면 환율보상 돼?"<br>
          • "주류 20% 할인에 담배 같이 사면?"<br>
          • "킨더부에노 2개 20% 할인 상품 환율보상 되나?"<br>
          • "유통기한 임박 화장품 쿠폰 적용 가능해?"
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="suggested">
        <button class="suggest-btn" onclick="askQuick('닷사이23 환율보상 돼?')">닷사이23</button>
        <button class="suggest-btn" onclick="askQuick('헤네시 할인 가능해?')">헤네시</button>
        <button class="suggest-btn" onclick="askQuick('전자담배 환율보상 되나요?')">전자담배</button>
        <button class="suggest-btn" onclick="askQuick('킨더부에노 2개 20% 환율보상 돼?')">킨더부에노</button>
        <button class="suggest-btn" onclick="askQuick('유통기한 임박 할인 상품 환율보상?')">유통기한 임박</button>
        <button class="suggest-btn" onclick="askQuick('주류 25% 할인 상품에 3% 추가 가능해?')">주류 25%+3%?</button>
      </div>
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="상품명 또는 상황을 입력하세요..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" id="sendBtn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>
<script>
const RULES = `
[환율보상 3% 쿠폰 적용 규칙 - 내부 직원 가이드]

== 기본 적용 조건 ==
- $17 이상 상품에만 적용 가능
- 기존 할인율이 25% 미만인 상품에만 적용 (단, 주류는 예외: 할인율 상관없이 모두 가능)
- 카카오웰컴 5% 쿠폰 사용 시 환율보상 3%와 중복 불가
- 담배 7천원 쿠폰 사용 시 환율보상 3%와 중복 불가

== 할인 조합 원칙 ==
- 동일 할인 중복 불가 (A+A 불가)
- 다른 종류 할인 중복 가능 (A+B 가능)
- 기본: 브랜드 할인 + (친구추천 5% 또는 환율보상 3%) 중 택1
- 최대 30%까지 조합 가능

== 적용 가능 케이스 ==
- 주류: 할인율 상관없이 환율보상 3% 모두 가능
- 전자담배/디바이스: $17 이상이면 가능 ($17 이하 불가)
- 3.0 디바이스 $37: 가능
- 담배: 7천원 쿠폰 미사용 시 가능
- 닷사이 전 품목: 가능 (단 닷사이23 제외)
- 닷사이23: 최대 15%까지만 적용 (환율보상 3% 불가)
- 바샤: 가능
- 주류20% + 담배 동시 구매: 20% + 담배5% + 환율보상3% 가능 (합계 28%)
- 주류15% + 담배 동시 구매: 15% + 담배5% + 환율보상3% 가능 (합계 23%)
- 조니워커 오디네어 1병+담배: 20% + 5% + 3% 가능
- 조니워커 오디네어 2병: 20% + 5% + 3% 가능

== 절대 적용 불가 상품 ==
- 헤네시, 조셉펠프스 인시그니아: 할인 자체 불가 상품
- 릴 에이블 2.0 PLUS / 릴 에이블 2.0: 친구추가 쿠폰 사용 시 불가
- 알로하 전 제품
- 에스티로더 더블웨어
- 쥬라, 닐슨, 탐라블린 전 제품
- $17 이하 디바이스
- 정관장
- 프롬K, 링티, GNC
- 뷰틱, 롤리닉, 동인비, 유니크미, 프롬맘, 유림
- 외 토산품
- 화장품/식품 유통기한 임박 할인 상품: 이미 할인 적용된 상품으로 환율보상 추가 불가
- Kinder Bueno(킨더부에노) 2개 묶음 20% 할인 적용 상품: 환율보상 추가 불가

== 닷사이 특별 규칙 ==
- 닷사이23 + 담배 구매: 최대 10%(닷사이) + 담배추가 5% + 환율보상 불가
- 닷사이 할인 제외 상품: 환율보상 3% 가능
- 닷사이23의 경우 최대 15% 적용 (환율보상 불가)
`;

const brands = [
  { name: '닷사이 (일반)', tags: ['환율보상 ✅', '$17이상'], status: 'ok', note: '환율보상 3% 적용 가능' },
  { name: '닷사이23', tags: ['최대 15%', '환율보상 ❌'], status: 'cond', note: '환율보상 불가, 최대 15%까지만' },
  { name: '주류 전반', tags: ['환율보상 ✅', '할인율 무관'], status: 'ok', note: '할인율 상관없이 가능' },
  { name: '바샤', tags: ['환율보상 ✅'], status: 'ok', note: '환율보상 3% 가능' },
  { name: '전자담배/디바이스', tags: ['$17이상 ✅', '$17이하 ❌'], status: 'cond', note: '$17 이상만 가능' },
  { name: '담배', tags: ['7천원쿠폰 미사용시 ✅'], status: 'cond', note: '7천원 쿠폰 미사용 시 가능' },
  { name: '킨더부에노 2개 묶음', tags: ['20%할인 ❌'], status: 'no', note: '20% 묶음 할인 적용 상품 환율보상 불가' },
  { name: '유통기한 임박 할인 상품', tags: ['화장품/식품 ❌'], status: 'no', note: '이미 할인 적용된 상품 추가 불가' },
  { name: '헤네시', tags: ['할인 전체 ❌'], status: 'no', note: '할인 자체 불가 상품' },
  { name: '인시그니아', tags: ['할인 전체 ❌'], status: 'no', note: '할인 자체 불가 상품' },
  { name: '알로하', tags: ['환율보상 ❌'], status: 'no', note: '전 제품 적용 불가' },
  { name: '에스티로더 더블웨어', tags: ['환율보상 ❌'], status: 'no', note: '적용 불가' },
  { name: '쥬라', tags: ['환율보상 ❌'], status: 'no', note: '전 제품 불가' },
  { name: '닐슨', tags: ['환율보상 ❌'], status: 'no', note: '전 제품 불가' },
  { name: '탐라블린', tags: ['환율보상 ❌'], status: 'no', note: '전 제품 불가' },
  { name: '정관장', tags: ['환율보상 ❌'], status: 'no', note: '적용 불가' },
  { name: '릴 에이블 2.0', tags: ['친구쿠폰시 ❌'], status: 'cond', note: '친구추가 쿠폰 사용 시 불가' },
  { name: '프롬K / 링티 / GNC', tags: ['환율보상 ❌'], status: 'no', note: '적용 불가' },
  { name: '뷰틱 / 롤리닉 / 동인비', tags: ['환율보상 ❌'], status: 'no', note: '적용 불가' },
  { name: '유니크미 / 프롬맘 / 유림', tags: ['환율보상 ❌'], status: 'no', note: '적용 불가' },
];

let filteredBrands = [...brands];

function renderBrands(list) {
  document.getElementById('brandList').innerHTML = list.map(b => `
    <div class="brand-card" onclick="showBrandResult(${brands.indexOf(b)})">
      <div class="brand-name">${b.name}</div>
      <div class="brand-tags">${b.tags.map(t => `<span class="tag ${b.status==='ok'?'tag-ok':b.status==='no'?'tag-no':'tag-cond'}">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function filterBrands() {
  const q = document.getElementById('brandSearch').value.toLowerCase();
  filteredBrands = q ? brands.filter(b => b.name.toLowerCase().includes(q)) : [...brands];
  renderBrands(filteredBrands);
}

function showBrandResult(idx) {
  const b = brands[idx];
  const statusText = b.status==='ok' ? '✅ 적용 가능' : b.status==='no' ? '❌ 적용 불가' : '⚠️ 조건부 가능';
  const statusClass = b.status==='ok' ? 'ok' : b.status==='no' ? 'no' : 'cond';
  document.getElementById('resultTitle').textContent = b.name;
  document.getElementById('resultRows').innerHTML = `
    <div class="result-row"><span class="result-label">환율보상 3%</span><span class="result-val ${statusClass}">${statusText}</span></div>
    <div class="result-row"><span class="result-label">비고</span><span class="result-val">${b.note}</span></div>
  `;
  document.getElementById('resultPanel').classList.add('show');
  askQuick(`${b.name} 환율보상 3% 적용 가능한지 상세하게 알려줘`);
}

renderBrands(brands);

function addMsg(content, type='ai') {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap' + (type==='user' ? ' user' : '');
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (type==='user' ? 'user' : 'ai');
  avatar.textContent = type==='user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + type;
  bubble.innerHTML = content;
  if (type==='user') { wrap.appendChild(bubble); wrap.appendChild(avatar); }
  else { wrap.appendChild(avatar); wrap.appendChild(bubble); }
  document.getElementById('chatMessages').appendChild(wrap);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.id = 'typingIndicator';
  wrap.innerHTML = `<div class="avatar ai">🤖</div><div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  const prompt = `당신은 면세점/주류담배 판매점의 할인 쿠폰 적용 전문 안내 AI입니다.
아래는 현재 적용 중인 환율보상 3% 쿠폰 규칙 전체입니다:

${RULES}

규칙:
1. 핵심 답변 먼저 명확하게 (적용 가능/불가/조건부)
2. 이유와 근거 간결하게
3. 가능하면 최대 할인 조합도 안내
4. 규칙에 없는 상품은 "별도 확인 필요"
5. 짧고 실용적으로 답변
6. 일반 텍스트로만 (HTML 태그 사용 금지)

질문: ${text}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '오류가 발생했습니다.';
    removeTyping();
    addMsg(reply.replace(/\n/g, '<br>'));
  } catch(e) {
    removeTyping();
    addMsg('오류: ' + e.message);
  }
  document.getElementById('sendBtn').disabled = false;
}

function askQuick(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}
</script>
</body>
</html>
