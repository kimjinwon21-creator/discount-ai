<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>행사 할인 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b0f; --surface: #12141a; --surface2: #1a1d26; --border: #252836;
  --accent: #3b82f6; --accent2: #60a5fa; --green: #22c55e; --red: #ef4444;
  --amber: #f59e0b; --text: #e2e8f0; --muted: #64748b;
  --sans: 'Noto Sans KR', sans-serif; --mono: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }
header { padding: 14px 24px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
.logo-box { width: 34px; height: 34px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 16px; }
header h1 { font-size: 15px; font-weight: 500; }
.header-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }
.data-status { margin-left: auto; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber); }
.status-dot.ok { background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

.layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 57px); }

.left { width: 300px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.panel-title { padding: 14px 16px 8px; font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.06em; }
.search-wrap { padding: 0 12px 8px; position: relative; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: var(--sans); }
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { outline: none; border-color: var(--accent); }

.filter-tabs { display: flex; gap: 4px; padding: 0 12px 8px; flex-wrap: wrap; }
.ftab { background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 4px 10px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.ftab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.result-panel { margin: 0 12px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: none; }
.result-panel.show { display: block; }
.result-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.result-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.result-row:last-child { border-bottom: none; }
.result-label { color: var(--muted); min-width: 60px; flex-shrink: 0; }
.ok { color: var(--green); } .no { color: var(--red); } .cond { color: var(--amber); }

.brand-list { padding: 0 12px; display: flex; flex-direction: column; gap: 5px; padding-bottom: 10px; }
.brand-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
.brand-card:hover { border-color: var(--accent); background: rgba(59,130,246,0.06); }
.brand-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; }
.brand-meta { font-size: 11px; color: var(--muted); display: flex; gap: 6px; align-items: center; }
.tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; }
.tag-ok { background: rgba(34,197,94,0.15); color: var(--green); }
.tag-no { background: rgba(239,68,68,0.15); color: var(--red); }
.tag-cond { background: rgba(245,158,11,0.15); color: var(--amber); }
.tag-cat { background: rgba(59,130,246,0.12); color: var(--accent2); }

.quick-section { padding: 0 12px 12px; }
.qbtn { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--muted); cursor: pointer; text-align: left; font-family: var(--sans); margin-bottom: 5px; transition: all 0.15s; }
.qbtn:hover { border-color: var(--accent); color: var(--text); }

.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.chat-header { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 8px; }
.ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
.chat-title { font-size: 14px; font-weight: 500; }
.chat-sub { font-size: 12px; color: var(--muted); margin-left: 4px; }

.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg-wrap { display: flex; gap: 10px; align-items: flex-start; }
.msg-wrap.user { flex-direction: row-reverse; }
.avatar { width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.avatar.ai { background: var(--accent); } .avatar.user { background: var(--surface2); border: 1px solid var(--border); }
.msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
.msg-bubble.ai { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 3px; }
.msg-bubble.user { background: var(--accent); color: #fff; border-top-right-radius: 3px; }

.typing { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)} }

.chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); }
.suggested { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.suggest-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
.suggest-btn:hover { border-color: var(--accent); color: var(--text); }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); font-size: 13px; font-family: var(--sans); }
.input-row input::placeholder { color: var(--muted); }
.input-row input:focus { outline: none; border-color: var(--accent); }
.send-btn { background: var(--accent); border: none; border-radius: 10px; width: 42px; height: 42px; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; flex-shrink: 0; }
.send-btn:hover { opacity: 0.85; } .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 640px) { .left { display: none; } }
</style>
</head>
<body>
<header>
  <div class="logo-box">🏷️</div>
  <h1>행사 할인 안내</h1>
  <span class="header-sub">— 경복궁 면세점</span>
  <div class="data-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">데이터 로딩 중...</span>
  </div>
</header>

<div class="layout">
  <div class="left">
    <div class="panel-title">브랜드 / 상품 조회</div>
    <div class="search-wrap">
      <input type="text" id="brandSearch" placeholder="브랜드명 검색..." oninput="filterBrands()">
    </div>
    <div class="filter-tabs" id="filterTabs"></div>
    <div class="result-panel" id="resultPanel">
      <div class="result-title" id="resultTitle"></div>
      <div id="resultRows"></div>
    </div>
    <div class="brand-list" id="brandList"></div>
    <div class="panel-title" style="margin-top:4px;">빠른 질문</div>
    <div class="quick-section">
      <button class="qbtn" onclick="askQuick('환율보상 3% 기본 적용 조건 전체 알려줘')">📋 기본 적용 조건</button>
      <button class="qbtn" onclick="askQuick('주류랑 담배 같이 사면 최대 얼마까지 할인돼?')">🍾 주류+담배 최대 할인</button>
      <button class="qbtn" onclick="askQuick('환율보상 절대 안되는 상품 전부 알려줘')">❌ 적용 불가 전체 목록</button>
      <button class="qbtn" onclick="askQuick('지금 진행 중인 행사 전부 알려줘')">🎉 현재 진행 행사</button>
      <button class="qbtn" onclick="askQuick('쿠폰 종류랑 중복 적용 규칙 알려줘')">🎫 쿠폰 종류 및 규칙</button>
      <button class="qbtn" onclick="askQuick('오스템 임직원 쿠폰 어떻게 써?')">👔 오스템 임직원 쿠폰</button>
    </div>
  </div>

  <div class="right">
    <div class="chat-header">
      <div class="ai-dot"></div>
      <span class="chat-title">할인 AI</span>
      <span class="chat-sub">— 상품명이나 상황을 말씀하시면 바로 안내해 드려요</span>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg-wrap">
        <div class="avatar ai">🤖</div>
        <div class="msg-bubble ai">
          안녕하세요! 경복궁 면세점 할인 안내 AI예요.<br><br>
          이렇게 물어보세요:<br>
          • "닷사이 환율보상 돼?"<br>
          • "주류 20%에 담배 같이 사면 최대 얼마야?"<br>
          • "오스템 임직원 쿠폰 주류에 쓰면?"<br>
          • "지금 진행 중인 행사 뭐 있어?"
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="suggested">
        <button class="suggest-btn" onclick="askQuick('닷사이23 환율보상 돼?')">닷사이23</button>
        <button class="suggest-btn" onclick="askQuick('헤네시 할인 가능해?')">헤네시</button>
        <button class="suggest-btn" onclick="askQuick('KT&G 믹스 추가할인 가능해?')">KT&G 믹스</button>
        <button class="suggest-btn" onclick="askQuick('킨더부에노 행사 설명해줘')">킨더부에노</button>
        <button class="suggest-btn" onclick="askQuick('알리페이 프로모션 알려줘')">알리페이</button>
        <button class="suggest-btn" onclick="askQuick('에스티로더 더블웨어 환율보상 돼?')">에스티로더</button>
      </div>
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="상품명 또는 상황을 입력하세요..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="send-btn" id="sendBtn" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
let DB = null;
let allBrands = [];
let activeCategory = '전체';

async function loadData() {
  try {
    const res = await fetch('data.json');
    DB = await res.json();
    allBrands = DB.brands;
    document.getElementById('statusDot').classList.add('ok');
    document.getElementById('statusText').textContent = '데이터 로드됨 · ' + DB.updated;
    buildFilterTabs();
    renderBrands(allBrands);
  } catch(e) {
    document.getElementById('statusText').textContent = '데이터 로드 실패';
    console.error(e);
  }
}

function buildFilterTabs() {
  const cats = ['전체', ...new Set(allBrands.map(b => b.category))];
  document.getElementById('filterTabs').innerHTML = cats.map(c =>
    `<div class="ftab ${c==='전체'?'active':''}" onclick="setCategory('${c}')">${c}</div>`
  ).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.textContent === cat));
  filterBrands();
}

function filterBrands() {
  const q = document.getElementById('brandSearch').value.toLowerCase();
  let list = activeCategory === '전체' ? allBrands : allBrands.filter(b => b.category === activeCategory);
  if (q) list = list.filter(b => b.name.toLowerCase().includes(q) || b.category.toLowerCase().includes(q));
  renderBrands(list);
}

function renderBrands(list) {
  document.getElementById('brandList').innerHTML = list.map(b => {
    const tagClass = b.exchange_rate_3 === '가능' ? 'tag-ok' : b.exchange_rate_3 === '불가' ? 'tag-no' : 'tag-cond';
    const tagText = b.exchange_rate_3 === '가능' ? '3% ✅' : b.exchange_rate_3 === '불가' ? '3% ❌' : '3% ⚠️';
    return `<div class="brand-card" onclick="showBrandResult('${b.name.replace(/'/g,"\\'")}')">
      <div class="brand-name">${b.name}</div>
      <div class="brand-meta">
        <span class="tag tag-cat">${b.category}</span>
        <span class="tag ${tagClass}">${tagText}</span>
      </div>
    </div>`;
  }).join('');
}

function showBrandResult(name) {
  const b = allBrands.find(x => x.name === name);
  if (!b) return;
  const statusText = b.exchange_rate_3 === '가능' ? '✅ 적용 가능' : b.exchange_rate_3 === '불가' ? '❌ 적용 불가' : '⚠️ 조건부 가능';
  const cls = b.exchange_rate_3 === '가능' ? 'ok' : b.exchange_rate_3 === '불가' ? 'no' : 'cond';
  document.getElementById('resultTitle').textContent = b.name;
  document.getElementById('resultRows').innerHTML = `
    <div class="result-row"><span class="result-label">환율보상 3%</span><span class="${cls}">${statusText}</span></div>
    <div class="result-row"><span class="result-label">조건</span><span>${b.condition || '-'}</span></div>
    ${b.note ? `<div class="result-row"><span class="result-label">비고</span><span style="color:var(--muted)">${b.note}</span></div>` : ''}
  `;
  document.getElementById('resultPanel').classList.add('show');
  askQuick(`${b.name} 환율보상 및 할인 적용 상세하게 알려줘`);
}

function buildPrompt(userText) {
  if (!DB) return userText;
  const dbStr = JSON.stringify(DB, null, 2);
  return `당신은 경복궁 면세점 할인 쿠폰 적용 전문 안내 AI입니다.
아래는 현재 행사/할인 데이터베이스 전체입니다:

${dbStr}

규칙:
1. 핵심 답변 먼저 명확하게 (적용 가능/불가/조건부)
2. 이유와 근거 간결하게
3. 가능하면 최대 할인 조합도 안내
4. DB에 없는 상품은 "별도 확인 필요"라고 답변
5. 짧고 실용적으로
6. 일반 텍스트로만 (HTML 태그 금지)

질문: ${userText}`;
}

function addMsg(content, type='ai') {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap' + (type==='user' ? ' user' : '');
  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + (type==='user' ? 'user' : 'ai');
  avatar.textContent = type==='user' ? '👤' : '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + type;
  bubble.innerHTML = content;
  if (type==='user') { wrap.appendChild(bubble); wrap.appendChild(avatar); }
  else { wrap.appendChild(avatar); wrap.appendChild(bubble); }
  document.getElementById('chatMessages').appendChild(wrap);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="avatar ai">🤖</div><div class="msg-bubble ai"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chatMessages').appendChild(wrap);
  document.getElementById('chatMessages').scrollTop = 99999;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  document.getElementById('sendBtn').disabled = true;
  addTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: buildPrompt(text) }]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || '오류가 발생했습니다.';
    removeTyping();
    addMsg(reply.replace(/\n/g, '<br>'));
  } catch(e) {
    removeTyping();
    addMsg('오류: ' + e.message);
  }
  document.getElementById('sendBtn').disabled = false;
}

function askQuick(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

loadData();
</script>
</body>
</html>
